name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend — syntax & dependency check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Syntax check — server.js
        working-directory: backend
        run: node --check server.js && node --check db.js
        env:
          DB_HOST: localhost
          DB_USER: test
          DB_PASS: test
          DB_NAME: test

  terraform-validate:
    name: Terraform — validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  frontend-check:
    name: Frontend — HTML lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check files exist
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js
          echo "All frontend files present"